name: Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.15.0'
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run type-check
      - run: npm run type-check --prefix compiler-service
      - run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.15.0'
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - run: npm run build:compiler

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/setup-sam@v2

      - run: sam build --template-file template.yaml

      - run: >
          sam deploy
          --no-confirm-changeset
          --no-fail-on-empty-changeset
          --stack-name lms-backend
          --capabilities CAPABILITY_IAM
          --parameter-overrides
          AllowedOrigins="${{ secrets.ALLOWED_ORIGINS }}"
          CompilerServiceUrl="${{ secrets.COMPILER_SERVICE_URL }}"
          DatabaseUrl="${{ secrets.DATABASE_URL }}"
          RedisUrl="${{ secrets.REDIS_URL }}"
          JwtSecret="${{ secrets.JWT_SECRET }}"
          RefreshTokenSecret="${{ secrets.REFRESH_TOKEN_SECRET }}"
          S3BucketName="${{ secrets.S3_BUCKET_NAME }}"
          CloudFrontDomain="${{ secrets.CLOUDFRONT_DOMAIN }}"
          PrivateSubnetIds="${{ secrets.PRIVATE_SUBNET_IDS }}"
          LambdaSecurityGroupIds="${{ secrets.LAMBDA_SECURITY_GROUP_IDS }}"

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - run: docker build -f Dockerfile.compiler -t ${{ steps.ecr.outputs.registry }}/lms-compiler:${{ github.sha }} -t ${{ steps.ecr.outputs.registry }}/lms-compiler:latest .

      - run: docker push ${{ steps.ecr.outputs.registry }}/lms-compiler:${{ github.sha }}

      - run: docker push ${{ steps.ecr.outputs.registry }}/lms-compiler:latest

      - run: aws ecs update-service --cluster lms-cluster --service lms-compiler --force-new-deployment

      - run: aws ecs wait services-stable --cluster lms-cluster --services lms-compiler
