AWSTemplateFormatVersion: '2010-09-09'
Description: Secrets Manager placeholder secrets for LMS staging
Resources:
  LmsDatabaseSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: lms/staging/database
      Description: "Database connection for LMS staging"
      SecretString: |
        {"DATABASE_URL":"REPLACE_ME"}

  LmsRedisSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: lms/staging/redis
      Description: "Redis connection for LMS staging"
      SecretString: |
        {"REDIS_URL":"REPLACE_ME"}

  LmsJwtSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: lms/staging/jwt
      Description: "JWT secret for staging"
      SecretString: |
        {"JWT_SECRET":"REPLACE_ME"}

Outputs:
  DatabaseSecretArn:
    Value: !Ref LmsDatabaseSecret
