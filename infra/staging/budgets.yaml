AWSTemplateFormatVersion: '2010-09-09'
Description: AWS Budgets for LMS staging
Parameters:
  MonthlyBudgetAmount:
    Type: Number
    Description: Monthly total spend threshold (USD)
  NotificationEmail:
    Type: String
    Description: Email address to receive budget alerts
Resources:
  StagingMonthlyBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: lms-staging-monthly
        BudgetLimit:
          Amount: !Ref MonthlyBudgetAmount
          Unit: USD
        BudgetType: COST
        TimeUnit: MONTHLY
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref NotificationEmail
